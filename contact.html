<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiikawa Land - Say Hello</title>
    <meta name="description" content="Send a cute message to the Chiikawa crew.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">ちいかわ</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">Characters</a>
            <a href="contact.html" class="active">Say Hello</a>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>Send a Message</h2>
            <p class="section-intro">Have something to share? Send Chiikawa a message! (Please keep it kind, or they will cry!)</p>
            
            <div class="form-container">
                <form id="contact-form" novalidate>
                    <div class="input-group">
                        <label for="username">Your Name</label>
                        <input type="text" id="username" placeholder="e.g., Pocket-sized fan">
                        <span class="error-msg" id="name-error"></span>
                    </div>

                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="e.g., cute@chiikawa.com">
                        <span class="error-msg" id="email-error"></span>
                    </div>

                    <div class="input-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="5" placeholder="Write something sweet..."></textarea>
                        <span class="error-msg" id="msg-error"></span>
                    </div>

                    <button type="submit" class="btn form-btn">Send Letter ✉</button>
                </form>
                <div id="success-message" class="success-box hidden">
                    <p>🎉 Yay! Your message has been sent successfully to Chiikawa, Hachiware, and Usagi!</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy;  2026 Kishimoto, Kanna D. Created with ♡ PE4 WDCSS.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
